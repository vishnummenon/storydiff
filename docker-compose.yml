services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: storydiff
    ports:
      - "5434:5432"
    volumes:
      - storydiff_pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - storydiff_qdrant:/qdrant/storage

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs
      DEBUG: "0"
    volumes:
      - storydiff_localstack:/var/lib/localstack

volumes:
  storydiff_pgdata:
  storydiff_qdrant:
  storydiff_localstack:
